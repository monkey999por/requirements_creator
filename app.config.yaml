# アプリケーション設定ファイル

# --- 共通設定（複数フェーズから参照） ---
output_base_dir: gen

# --- collect フェーズ設定 ---
collect:
  sources:
    # NewsAPI (https://newsapi.org/)
    newsapi:
      enabled: false
      # 環境変数名（.envに定義）
      api_key_env: NEWS_API_KEY
      endpoint: https://newsapi.org/v2/top-headlines
      params:
        country: jp
        category: health
        pageSize: 20
      # 出力ファイル名（data_source/yyyy_mm_dd_hh_mm_ss/ 内）
      output_file: news.json

    # YouTube Data API - カテゴリ指定 (https://developers.google.com/youtube/v3)
    # カテゴリID: 1=映画, 10=音楽, 20=ゲーム, 28=科学技術, 25=ニュース, 17=スポーツ
    youtube:
      type: youtube
      enabled: true
      api_key_env: YOUTUBE_DATA_API_KEY
      endpoint: https://www.googleapis.com/youtube/v3/videos
      params:
        chart: mostPopular
        regionCode: JP
        maxResults: 20
        videoCategoryId: "1"
      output_file: youtube.json

    # YouTube Data API - 全体ランキング（カテゴリなし）
    youtube_all:
      type: youtube
      enabled: false
      api_key_env: YOUTUBE_DATA_API_KEY
      endpoint: https://www.googleapis.com/youtube/v3/videos
      params:
        chart: mostPopular
        regionCode: JP
        maxResults: 20
      output_file: youtube_all.json

    # X (Twitter) Trends API (https://docs.x.com/x-api/trends/introduction)
    # WOEID: 1=世界, 23424856=日本, 1118370=東京
    x:
      type: x
      enabled: false
      api_key_env: X_API_BEARER_TOKEN
      endpoint: https://api.x.com/2/trends/by/woeid
      params:
        woeid: 23424856
      output_file: x_trends.json

    # X (Twitter) Popular Posts - バズったツイートを取得
    # sort_order=relevancy でエンゲージメントの高い投稿を優先取得
    # query: lang/is/has等のオペレーターだけでは使用不可。キーワードが最低1つ必要
    # query例: "(話題 OR トレンド OR 注目) lang:ja -is:retweet -is:reply"
    #          "#AI lang:ja -is:retweet"
    x_popular_posts:
      type: x_popular_posts
      enabled: false
      api_key_env: X_API_BEARER_TOKEN
      endpoint: https://api.x.com/2/tweets/search/recent
      params:
        query: "(話題 OR トレンド OR 注目 OR ニュース OR 最新) lang:ja -is:retweet -is:reply"
        maxResults: 20
        sort_order: relevancy
      output_file: x_popular_posts.json

    # Threads API - キーワード検索 (https://developers.facebook.com/docs/threads/keyword-search)
    # 権限: threads_keyword_search が必要
    # レート制限: 7日間で500クエリ
    # パラメータ:
    #   q: 検索キーワード（必須）
    #   search_type: TOP（人気順、デフォルト）/ RECENT（新着順）
    #   search_mode: KEYWORD（デフォルト）/ TAG（トピックタグ検索）
    #   media_type: TEXT / IMAGE / VIDEO（省略時は全タイプ）
    #   limit: 取得件数（デフォルト25、最大100）
    threads:
      type: threads
      enabled: false
      api_key_env: THREADS_ACCESS_TOKEN
      endpoint: https://graph.threads.net/v1.0/keyword_search
      params:
        q: "てす"
        search_type: RECENT
        limit: 25
      output_file: threads.json

