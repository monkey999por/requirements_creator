# --- generate フェーズ設定 ---
generate:
  # 制約条件（オプション）
  # 生成されるアプリ案の技術構成・規模を制御する。未指定の項目はAIが自由に判断する。
  # constraints:
  #   platform: fullstack          # frontend-only / fullstack / mobile-android / mobile-ios / mobile-cross
  #   budget: low                  # free / low / moderate / high（月額目安: free=0円, low=〜5千円, moderate=〜5万円, high=上限なし）
  #   difficulty: easy             # easy / medium / hard
  #   team_size: solo              # solo / small(2-3人) / medium(4-8人) / large(9人以上)

  # マルチエージェント設定
  # 各エージェントに役割（role）を割り当て、要件生成の各フェーズで活用する
  # 定義済みロール:
  #   researcher - Phase 1: keyword.jsonからトレンド・技術の外部調査（主にGemini向け）
  #   designer   - Phase 2: keywords + research結果からアプリコンセプト案を提案（主にCodex向け）
  #   reviewer   - Phase 4: 生成された要件の品質・完全性チェック
  #   enhancer   - Phase 5: レビュー結果に基づく要件の修正・補強
  agents:
    codex:
      enabled: true
      model: o4-mini
      sandbox: read-only
      roles:
        - designer
        - reviewer
    gemini:
      enabled: false
      model: gemini-2.5-pro
      roles:
        - researcher
