# --- 通知設定 ---
notifications:
  slack:
    enabled: true
    # Bot Tokenの環境変数名（.envに定義）
    # Slack Appの OAuth & Permissions で取得した xoxb- トークンを設定する
    # 詳細は SLACK_NOTIFICATION.md を参照
    token_env: SLACK_BOT_USER_OAUTH_TOKEN
    # Viewerへのリンク生成用ホスト（通知メッセージにアプリへのリンクを含める）
    viewer_host: http://100.113.125.78:3001
    # メンション設定（通知メッセージにメンションを付与）
    # - Slack User ID（例: U01ABCDEF）を指定すると <@U01ABCDEF> 形式で個人メンション
    # - "channel" を指定すると <!channel> でチャンネル全員にメンション
    # - 未設定の場合はメンションなし
    mention: channel

# --- パイプライン共通設定 ---
pipeline:
  # デフォルトで使用する data_source サブディレクトリ名
  # 省略時は最新ディレクトリを自動検出。CLIの --target / --source で上書き可能
  # default_source: 2026_02_10_01_54_10

# --- extract フェーズ設定 ---
extract:
  # 連想ゲーム方式の設定
  # enabled: true の場合、収集データに直接書かれていない関連キーワードも連想で抽出する
  # enabled: false の場合、収集データから直接読み取れるキーワードのみ抽出する
  association:
    enabled: true
    # 連想の深さ:
    #   shallow  — 元データから1段階の連想（直接的な関連語・類義語）
    #   moderate — 2段階の連想（関連分野・応用領域まで）（デフォルト）
    #   deep     — 3段階以上の連想（異分野の組み合わせ・創造的な飛躍まで）
    depth: deep

# --- generate フェーズ設定 ---
generate:
  # 制約条件（オプション）
  # 生成されるアプリ案の技術構成・規模を制御する。未指定の項目はAIが自由に判断する。
  # 有効値:
  #   platform: frontend-only / fullstack / mobile-android / mobile-ios / mobile-cross
  #   budget: free / low / moderate / high（月額目安: free=0円, low=〜5千円, moderate=〜5万円, high=上限なし）
  #   difficulty: easy / medium / hard
  #   team_size: solo / small(2-3人) / medium(4-8人) / large(9人以上)
  #   tech_stack: 使用する技術スタック（指定した技術がベース。AIは必要に応じて追加可能だが、指定技術は必ず採用する）
  #     frontend / backend / database / hosting / auth / other（リスト）
  constraints:
    platform: mobile-android
    budget: free

  # 生成観点（オプション）
  # アプリ案の"性格"や"設計哲学"を制御する。constraintsが技術的制約であるのに対し、
  # perspectivesはアプリの体験設計・マネタイズ戦略の方向性を指定する。
  #
  # mode:
  #   single  — items の先頭1つだけを適用
  #   combine — items に列挙した複数の観点を掛け合わせて適用
  #   random  — 定義済み観点からランダムに1〜3個を選択して組み合わせ（items は無視）
  #
  # 定義済み観点（items に指定可能な値）:
  #   kindness    — ユーザーに寄り添う優しいUX設計（アクセシビリティ重視、丁寧なオンボーディング等）
  #   cunning     — 巧妙なマネタイズ・行動設計（ダークパターンではなく、賢いビジネスモデル設計）
  #   frustration — フラストレーション駆動の設計（無料版の制限による課金誘導、待ち時間の活用等）
  #   dopamine    — 中毒性のある体験設計（ゲーミフィケーション、報酬ループ、ストリーク等）
  #   target-focus — ターゲットユーザー層に徹底的に最適化した設計（ニッチ特化）
  #
  # perspectives:
  #   mode: combine
  #   items:
  #     - dopamine
  #     - cunning

  # マルチエージェント設定
  # 各エージェントに役割（role）を割り当て、要件生成の各フェーズで活用する
  # 定義済みロール:
  #   researcher - Phase 1: keyword.jsonからトレンド・技術の外部調査（主にGemini向け）
  #   designer   - Phase 2: keywords + research結果からアプリコンセプト案を提案（主にCodex向け）
  #   reviewer   - Phase 4: 生成された要件の品質・完全性チェック
  #   enhancer   - Phase 5: レビュー結果に基づく要件の修正・補強
  agents:
    codex:
      enabled: true
      model: o4-mini
      sandbox: read-only
      roles:
        - designer
        - reviewer
    gemini:
      enabled: true
      model: gemini-2.5-pro
      roles:
        - designer
        - researcher
  perspectives:
    mode: random
